<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI Face Expression Tool</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        h2 { margin-bottom: 5px; text-align: center; font-size: 24px; color: #a29bfe; }
        
        /* ভাষা পরিবর্তনের বাটন */
        .lang-switch {
            margin-bottom: 15px;
            background: var(--card-bg);
            border: 1px solid #334155;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 300px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: #000;
            border: 2px solid #334155;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* মিরর ইফেক্ট */ }
        
        /* অ্যানিমেটেড ইমোজি ওভারলে */
        #emoji-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 55px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            padding: 8px;
            animation: pulse 2s infinite;
            pointer-events: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .post-box {
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #334155;
        }
        .status {
            font-weight: bold;
            color: #ff7675;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .confidence { color: #55efc4; font-size: 14px; margin-left: 5px; }
        
        .generated-post {
            font-size: 16px;
            color: #cbd5e1;
            padding: 15px;
            border: 2px dashed var(--primary);
            background: rgba(108, 92, 231, 0.1);
            border-radius: 10px;
            margin-bottom: 15px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* প্রিমিয়াম বাটন গ্রুপ */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .btn {
            background: #334155;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .btn:hover { background: var(--primary); }
        
        #loading {
            color: #fff;
            background-color: var(--primary);
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h2 id="title-text">AI ফেস ডিটেকশন ও ফানি পোস্ট 🎭</h2>
    <button class="lang-switch" onclick="toggleLanguage()">Language: BN</button>
    
    <div id="loading">🚀 AI মডেল লোড হচ্ছে, একটু অপেক্ষা করুন...</div>
    
    <div class="container">
        <video id="video" autoplay muted playsinline></video>
        <div id="emoji-overlay">⏳</div>
    </div>

    <div class="post-box">
        <div class="status"><span id="lbl-mood">আপনার মুড:</span> <span id="mood-text">...</span><span id="confidence-text" class="confidence"></span></div>
        <div class="generated-post" id="post-text">...</div>
        
        <div class="btn-group">
            <button class="btn" onclick="speakPost()">🎙️ <span id="btn-voice">শুনুন</span></button>
            <button class="btn" onclick="takeScreenshot()">📸 <span id="btn-snap">স্ক্রিনশট</span></button>
            <button class="btn" onclick="sharePost()">📱 <span id="btn-share">শেয়ার</span></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const emojiOverlay = document.getElementById('emoji-overlay');
        const moodText = document.getElementById('mood-text');
        const confidenceText = document.getElementById('confidence-text');
        const postText = document.getElementById('post-text');
        const loading = document.getElementById('loading');
        
        let currentLang = 'bn'; 
        let currentExpression = 'neutral';
        const MODEL_URL = 'https://vladmandic.github.io/face-api/model/';

        // ডাইনামিক প্রিমিয়াম ডেটাসেট (বাংলা ও ইংরেজি)
        const languageData = {
            bn: {
                loading: "🚀 AI মডেল লোড হচ্ছে, একটু অপেক্ষা করুন...",
                loaded: "✅ রেডি! ক্যামেরা পারমিশন দিন...",
                err_model: "❌ লোড ফেইল হয়েছে। পেজ রিলোড দিন।",
                err_cam: "ক্যামেরা পারমিশন দেওয়া হয়নি!",
                lbl_mood: "আপনার মুড:",
                btn_voice: "শুনুন", btn_snap: "স্ক্রিনশট", btn_share: "শেয়ার",
                title: "AI ফেস ডিটেকশন ও ফানি পোস্ট 🎭",
                searching: "ফেস খুঁজছি...",
                moods: { neutral: "সাধারণ", happy: "খুশি", sad: "দুঃখিত", angry: "রাগান্বিত", surprised: "অবাক" },
                posts: {
                    neutral: ["জীবনটা পুরাই প্যারালাল ইউনিভার্স হয়ে গেছে, কোনো ফিলিং নাই!", "ক্যামেরার দিকে তাকিয়ে একটা ভালো এক্সপ্রেশন দিন ভাই! 😐"],
                    happy: ["আজ মনটা এতো ভালো যে ইচ্ছা করতেছে সবাইকে বিকাশ করে দেই! (কিন্তু ব্যালেন্সে টাকা নাই 🥲)", "হাসিটা সুন্দর! এই হাসির রহস্য কি ক্রাশের রিপ্লাই? নাকি পকেটে টাকা? 😂"],
                    sad: ["ক্রাশের রিপ্লাই না পেয়ে সিঙ্গেল লাইফের দুঃখ আর সহ্য হচ্ছে না ভাই! 💔", "মন খারাপ করে লাভ নাই, দুনিয়াটা মায়া! একটা চা খেয়ে আসেন 😭"],
                    angry: ["সামনে যে আসবে তার খবর আছে! এখন কেউ যদি বলে 'চা খাবি?' তাকেও মারবো! 🤬", "রাগ কমিয়ে হাসুন, রাগলে কিন্তু বুড়ো হয়ে যাবেন দ্রুত!"],
                    surprised: ["পরীক্ষায় পাস করে গেছি নাকি! নাকি স্বপ্নে দেখলাম? অবিশ্বাস্য! 😲", "একি! লটারী লেগে গেল নাকি আপনার? এত বড় হা!"]
                }
            },
            en: {
                loading: "🚀 Loading AI Models, please wait...",
                loaded: "✅ Ready! Please allow camera access...",
                err_model: "❌ Model load failed. Please refresh.",
                err_cam: "Camera permission denied!",
                lbl_mood: "Your Mood:",
                btn_voice: "Listen", btn_snap: "Snapshot", btn_share: "Share",
                title: "AI Face & Fun Post Gen 🎭",
                searching: "Searching face...",
                moods: { neutral: "Neutral", happy: "Happy", sad: "Sad", angry: "Angry", surprised: "Surprised" },
                posts: {
                    neutral: ["Life is currently running on autopilot mode. No feelings!", "Give me some expressions, don't look like a robot! 😐"],
                    happy: ["Smiling? Looks like someone just got a text from their crush! 😍", "Your smile is infectious! Keep spreading the joy! 😂"],
                    sad: ["Sad vibes only. Is it Monday already or did your code break? 💔", "Cheer up! Tomorrow is another day to try again 😭"],
                    angry: ["Woah, calm down! Who stole your food? 🤬", "Danger zone! Step back, this person is on fire right now!"],
                    surprised: ["Wait, did you just see Bitcoin hitting a new high? 😲", "Unbelievable! You look like you just saw a ghost!"]
                }
            }
        };

        // ভাষা পরিবর্তন করার ফাংশন
        function toggleLanguage() {
            currentLang = currentLang === 'bn' ? 'en' : 'bn';
            document.querySelector('.lang-switch').innerText = `Language: ${currentLang.toUpperCase()}`;
            document.getElementById('title-text').innerText = languageData[currentLang].title;
            document.getElementById('lbl-mood').innerText = languageData[currentLang].lbl_mood;
            document.getElementById('btn-voice').innerText = languageData[currentLang].btn_voice;
            document.getElementById('btn-snap').innerText = languageData[currentLang].btn_snap;
            document.getElementById('btn-share').innerText = languageData[currentLang].btn_share;
            updateUI(currentExpression, 0); 
        }

        async function loadModels() {
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                loading.innerText = languageData[currentLang].loaded;
                startVideo();
            } catch (error) {
                loading.style.backgroundColor = '#ff4757';
                loading.innerText = languageData[currentLang].err_model;
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => { 
                    video.srcObject = stream; 
                    loading.style.display = 'none';
                })
                .catch(err => {
                    loading.style.backgroundColor = '#ff4757';
                    loading.innerText = languageData[currentLang].err_cam;
                });
        }

        video.addEventListener('play', () => {
            let lastExpression = "";
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                
                if (detections && detections.length > 0) {
                    const expressions = detections[0].expressions;
                    const maxExpression = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                    const confidence = (expressions[maxExpression] * 100).toFixed(0);
                    
                    currentExpression = maxExpression;
                    
                    if(maxExpression !== lastExpression) {
                        updateUI(maxExpression, confidence);
                        lastExpression = maxExpression;
                    } else {
                        confidenceText.innerText = ` (${confidence}%)`;
                    }
                } else {
                    emojiOverlay.innerText = "👤";
                    moodText.innerText = languageData[currentLang].searching;
                    confidenceText.innerText = "";
                }
            }, 600); 
        });

        // UI আপডেট করার লজিক
        function updateUI(expression, confidence) {
            let emojis = { neutral: "😐", happy: "😂", sad: "😭", angry: "🤬", surprised: "😲" };
            
            emojiOverlay.innerText = emojis[expression] || "😐";
            moodText.innerText = languageData[currentLang].moods[expression] || expression;
            confidenceText.innerText = confidence ? ` (${confidence}%)` : "";
            
            const postArray = languageData[currentLang].posts[expression] || languageData[currentLang].posts['neutral'];
            const randomPost = postArray[Math.floor(Math.random() * postArray.length)];
            postText.innerText = randomPost;
        }

        // 🎙️ ১. ভয়েস (SpeechSynthesis)
        function speakPost() {
            window.speechSynthesis.cancel(); 
            const text = postText.innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = currentLang === 'bn' ? 'bn-BD' : 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        // 📸 ২. স্ক্রিনশট
        function takeScreenshot() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // ভিডিওর মিরর ইফেক্ট ঠিক করা
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const link = document.createElement('a');
            link.download = `AI_Mood_Snapshot_${Date.now()}.jpeg`;
            link.href = canvas.toDataURL('image/jpeg');
            link.click();
        }

        // 📱 ৩. শেয়ার/কপি
        function sharePost() {
            const shareText = `${postText.innerText} (My AI Mood: ${moodText.innerText})`;
            if (navigator.share) {
                navigator.share({ title: 'AI Mood Post', text: shareText }).catch(console.error);
            } else {
                navigator.clipboard.writeText(shareText);
                alert(currentLang === 'bn' ? "পোস্টটি ক্লিপবোর্ডে কপি হয়েছে!" : "Post copied to clipboard!");
            }
        }

        loadModels();
    </script>
</body>
</html>
